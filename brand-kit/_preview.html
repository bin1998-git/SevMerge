<!doctype html><html><head><meta charset="utf-8"><style>
body{margin:0;background:#EBEEF4;font-family:sans-serif;padding:30px;display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start}
.card{background:#fff;border:1px solid #E2E7F0;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:10px;align-items:center}
.dark{background:#0C1424}
img{display:block}
.lbl{font:11px monospace;color:#5A6B85}
</style></head><body>
<div class="card"><img src="assets/logo-primary.svg" width="300"><div class="lbl">logo-primary.svg</div></div>
<div class="card dark"><img src="assets/logo-primary-reversed.svg" width="300"><div class="lbl" style="color:#9AA7BD">primary-reversed</div></div>
<div class="card"><img src="assets/logo-horizontal.svg" width="260"><div class="lbl">horizontal.svg</div></div>
<div class="card dark"><img src="assets/logo-horizontal-reversed.svg" width="260"><div class="lbl" style="color:#9AA7BD">horizontal-reversed</div></div>
<div class="card"><img src="assets/wordmark.svg" width="200"><div class="lbl">wordmark.svg</div></div>
<div class="card"><img src="assets/symbol.svg" width="90"><div class="lbl">symbol.svg</div></div>
<div class="card"><img src="assets/app-icon.svg" width="90"><div class="lbl">app-icon.svg</div></div>
<div class="card dark"><img src="assets/app-icon-dark.svg" width="90"><div class="lbl" style="color:#9AA7BD">app-icon-dark</div></div>
<div class="card"><img src="assets/favicon-64.png" width="64"><img src="assets/favicon-32.png" width="32"><img src="assets/favicon-16.png" width="16"><div class="lbl">favicons png</div></div>
</body></html>
